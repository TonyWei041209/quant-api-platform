name: CI

# CI-only workflow.
#
# Production deployment runs from a developer workstation via
# `scripts\deploy-api.ps1` (Cloud Run + sync-job alignment) and
# `firebase deploy --only hosting` (Firebase Hosting). This file
# intentionally does NOT deploy anything, NOT run gcloud / firebase
# commands, NOT touch GCP secrets, NOT call alembic migrations,
# NOT modify Cloud Scheduler, NOT call Trading 212 endpoints, and
# NOT mutate FEATURE_T212_LIVE_SUBMIT.
#
# Scope:
#   * backend unit tests only (`tests/unit`) — hermetic, no Postgres
#     service container needed, no Firebase auth token needed
#   * frontend Vite build (no deploy)
#
# Integration tests under `tests/integration/` are skipped here on
# purpose; they require a real Postgres at localhost:5432 and a
# Firebase ID token, neither of which exists on a vanilla GitHub
# runner. Run them locally before pushing.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# No production secrets, no GCP/Firebase project IDs, no DB URLs.
env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  backend-unit-tests:
    name: Backend unit tests (hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests only
        # Scope locked to tests/unit — these tests do NOT require
        # Postgres, do NOT require a Firebase ID token, and do NOT
        # call any external provider (FMP, Polygon/Massive, T212,
        # SEC, OpenFIGI). Integration tests are excluded by design.
        run: python -m pytest tests/unit -q --tb=short

  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Build frontend
        working-directory: frontend-react
        # Vite build only. No `firebase deploy`. The built artifact is
        # NOT uploaded anywhere by this workflow.
        run: npm run build
